AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AI Agent Morning Digest — all infrastructure resources.
  Creates the Lambda function, EventBridge schedule, DynamoDB tables,
  and the IAM role the Lambda runs under. Email is sent via Gmail SMTP.
 
# =============================================================================
# Parameters
# Passed in at deploy time via the deploy.ps1 script.
# Nothing here should be hardcoded — change values in deploy.ps1 instead.
# =============================================================================
Parameters:

  SmtpSenderEmail:
    Type: String
    Description: >
      Gmail address the digest is sent FROM.
      Must match the account that owns the App Password below.

  SmtpRecipientEmail:
    Type: String
    Description: >
      Email address the digest is delivered TO.

  SmtpPassword:
    Type: String
    NoEcho: true
    Description: >
      Gmail App Password for the sender account.
      Generate at https://myaccount.google.com/apppasswords.
      NoEcho prevents it from appearing in CloudFormation console output.
 
  ScheduleExpression:
    Type: String
    Default: "cron(0 12 * * ? *)"
    Description: >
      EventBridge schedule in UTC. Default is 7am Eastern (12:00 UTC).
      Adjust for your timezone. Uses AWS cron syntax.
 
  LambdaTimeout:
    Type: Number
    Default: 900
    Description: >
      Lambda timeout in seconds. 900 (15 min) accommodates multi-agent LLM
      execution across topic, fetch, scoring, synthesis, and both supervisors.

  LambdaMemory:
    Type: Number
    Default: 1024
    Description: >
      Lambda memory in MB. CrewAI agent loops are CPU-bound so more memory
      also means more vCPU allocation. 1024 provides headroom for concurrent
      agent execution without OOM on typical digest runs.
 
  ImageUri:
    Type: String
    Description: >
      ECR image URI for the Lambda container, e.g.
      123456789012.dkr.ecr.us-east-1.amazonaws.com/digest-agent-prod:latest.
      Built and pushed by deploy.ps1 before each CloudFormation deploy.

  Environment:
    Type: String
    Default: "prod"
    AllowedValues: ["prod", "dev"]
    Description: Used to namespace resource names so dev and prod can coexist.
 
 
# =============================================================================
# Resources
# =============================================================================
Resources:
 
  # ---------------------------------------------------------------------------
  # DynamoDB Tables
  # ---------------------------------------------------------------------------
 
  RunRecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-run-records-${Environment}"
      BillingMode: PAY_PER_REQUEST       # on-demand — no capacity to manage
      TableClass: STANDARD_INFREQUENT_ACCESS  # cheaper for infrequently read data
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false  # not worth the cost for expendable run data
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl              # DynamoDB auto-deletes records after 30 days
        Enabled: true                   # TTL value written by the Trend node at run time
      Tags:
        - Key: Project
          Value: digest-agent
 
  WeeklySynthesisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-weekly-synthesis-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: week_id
          AttributeType: S
      KeySchema:
        - AttributeName: week_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl              # 90-day TTL written by Trend node
        Enabled: true
      Tags:
        - Key: Project
          Value: digest-agent
 
  TrendsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-trends-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD               # queried on every run — standard is faster
      AttributeDefinitions:
        - AttributeName: trend_id
          AttributeType: S
      KeySchema:
        - AttributeName: trend_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: digest-agent
 
  SourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-sources-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD               # read on every run for reputation map
      AttributeDefinitions:
        - AttributeName: domain
          AttributeType: S
      KeySchema:
        - AttributeName: domain
          KeyType: HASH
      Tags:
        - Key: Project
          Value: digest-agent
 
 
  # ---------------------------------------------------------------------------
  # IAM Role
  # Least-privilege: only the specific actions this Lambda actually needs.
  # ---------------------------------------------------------------------------
 
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "digest-agent-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic Lambda execution — allows CloudWatch Logs writes only
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DigestAgentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
 
              # DynamoDB — all four tables, only the operations we actually use
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RunRecordsTable.Arn
                  - !GetAtt WeeklySynthesisTable.Arn
                  - !GetAtt TrendsTable.Arn
                  - !GetAtt SourcesTable.Arn
 
              # Bedrock — all four models used in the pipeline
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  # Haiku 4.5 (topic, fetch, scoring, signal extraction)
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                  # Sonnet 4.6 — synthesis writer (uses cross-region inference profile)
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-6"
                  - !Sub "arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-4-6"
                  # Amazon Nova Pro — input supervisor
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-pro-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.amazon.nova-pro-v1:0"
                  # Meta Llama 3.3 70B — output supervisor
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/meta.llama3-3-70b-instruct-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.meta.llama3-3-70b-instruct-v1:0"
 
 
  # ---------------------------------------------------------------------------
  # Lambda Function
  # ---------------------------------------------------------------------------
 
  DigestAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "digest-agent-${Environment}"
      Description: "AI Agent Morning Digest — hub-and-spoke CrewAI pipeline"
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          # DynamoDB table names — match what CFT creates above
          DYNAMODB_RUNS_TABLE: !Ref RunRecordsTable
          DYNAMODB_WEEKLY_TABLE: !Ref WeeklySynthesisTable
          DYNAMODB_TRENDS_TABLE: !Ref TrendsTable
          DYNAMODB_SOURCES_TABLE: !Ref SourcesTable
          # Gmail SMTP
          SMTP_SENDER_EMAIL: !Ref SmtpSenderEmail
          SMTP_RECIPIENT_EMAIL: !Ref SmtpRecipientEmail
          SMTP_APP_TOKEN: !Ref SmtpPassword
          # Bedrock model IDs — must match model IDs in AWS Bedrock console
          BEDROCK_MODEL_HAIKU: "bedrock/anthropic.claude-haiku-4-5-20251001-v1:0"
          BEDROCK_MODEL_SONNET: "bedrock/anthropic.claude-sonnet-4-6"
          # Supervisor models — intentionally different providers to avoid monoculture
          BEDROCK_MODEL_INPUT_SUPERVISOR: "bedrock/us.amazon.nova-pro-v1:0"
          BEDROCK_MODEL_OUTPUT_SUPERVISOR: "bedrock/us.meta.llama3-3-70b-instruct-v1:0"
          # AWS region passed explicitly so boto3 clients don't need to discover it
          AWS_REGION_NAME: !Ref AWS::Region
      Tags:
        - Key: Project
          Value: digest-agent
 
 
  # ---------------------------------------------------------------------------
  # EventBridge Scheduled Rule
  # ---------------------------------------------------------------------------
 
  DigestScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "digest-agent-daily-${Environment}"
      Description: "Triggers the digest agent Lambda every morning"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: DigestAgentTarget
          Arn: !GetAtt DigestAgentFunction.Arn
 
  # Permission for EventBridge to invoke the Lambda
  DigestSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DigestAgentFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DigestScheduleRule.Arn
 
 
# =============================================================================
# Outputs
# Values printed after deploy — useful for debugging and future stack references
# =============================================================================
Outputs:
 
  LambdaFunctionName:
    Description: "Lambda function name"
    Value: !Ref DigestAgentFunction
 
  LambdaFunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt DigestAgentFunction.Arn
 
  RunRecordsTableName:
    Description: "DynamoDB run records table name"
    Value: !Ref RunRecordsTable
 
  TrendsTableName:
    Description: "DynamoDB trends table name"
    Value: !Ref TrendsTable
 
  SourcesTableName:
    Description: "DynamoDB sources table name"
    Value: !Ref SourcesTable
 
  LambdaRoleArn:
    Description: "IAM role ARN — useful for verifying permissions"
    Value: !GetAtt LambdaExecutionRole.Arn