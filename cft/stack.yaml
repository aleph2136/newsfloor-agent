AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AI Agent Morning Digest — all infrastructure resources.
  Creates the Lambda function, EventBridge schedule, DynamoDB tables,
  and the IAM role the Lambda runs under. Email is sent via Gmail SMTP.
 
# =============================================================================
# Parameters
# Passed in at deploy time via the deploy.ps1 script.
# Nothing here should be hardcoded — change values in deploy.ps1 instead.
# =============================================================================
Parameters:

  SmtpSenderEmail:
    Type: String
    Description: >
      Gmail address the digest is sent FROM.
      Must match the account that owns the App Password below.

  SmtpRecipientEmail:
    Type: String
    Description: >
      Email address the digest is delivered TO.

  SmtpPassword:
    Type: String
    NoEcho: true
    Description: >
      Gmail App Password for the sender account.
      Generate at https://myaccount.google.com/apppasswords.
      NoEcho prevents it from appearing in CloudFormation console output.
 
  ScheduleExpression:
    Type: String
    Default: "cron(0 7 * * ? *)"
    Description: >
      EventBridge schedule in UTC. Default is 7am Eastern (12:00 UTC).
      Adjust for your timezone. Uses AWS cron syntax.
 
  LambdaTimeout:
    Type: Number
    Default: 900
    Description: >
      Lambda timeout in seconds. 900 (15 min) accommodates multi-agent LLM
      execution across topic, fetch, scoring, synthesis, and both supervisors.

  LambdaMemory:
    Type: Number
    Default: 1024
    Description: >
      Lambda memory in MB. CrewAI agent loops are CPU-bound so more memory
      also means more vCPU allocation. 1024 provides headroom for concurrent
      agent execution without OOM on typical digest runs.
 
  ImageUri:
    Type: String
    Description: >
      ECR image URI for the Lambda container, e.g.
      123456789012.dkr.ecr.us-east-1.amazonaws.com/digest-agent-prod:latest.
      Built and pushed by deploy.ps1 before each CloudFormation deploy.

  Environment:
    Type: String
    Default: "prod"
    AllowedValues: ["prod", "dev"]
    Description: Used to namespace resource names so dev and prod can coexist.

  PersonalSiteBucketName:
    Type: String
    Description: >
      S3 bucket name for the personal site. Used to grant the Lambda write
      access for article uploads and sitemap updates.

  PersonalSiteDistributionId:
    Type: String
    Description: >
      CloudFront distribution ID for the personal site. Used to grant the
      Lambda permission to create cache invalidations after content updates.

  PersonalSiteDomain:
    Type: String
    Description: >
      Custom domain for the personal site, e.g. "sam-griffith.dev" (no trailing
      slash). Used to build canonical article URLs in the sitemap and OG tags.

  PersonalSiteAuthorName:
    Type: String
    Description: >
      Author name rendered in article page sidebars and article footers,
      e.g. "Sam Griffith".

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: >
      Google Gemini API key used by the digest writer agent.
      NoEcho prevents it from appearing in CloudFormation console output.
      Generate at: https://aistudio.google.com/apikey
 
 
# =============================================================================
# Resources
# =============================================================================
Resources:
 
  # ---------------------------------------------------------------------------
  # DynamoDB Tables
  # ---------------------------------------------------------------------------
 
  RunRecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-run-records-${Environment}"
      BillingMode: PAY_PER_REQUEST       # on-demand — no capacity to manage
      TableClass: STANDARD_INFREQUENT_ACCESS  # cheaper for infrequently read data
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false  # not worth the cost for expendable run data
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl              # DynamoDB auto-deletes records after 30 days
        Enabled: true                   # TTL value written by the Trend node at run time
      Tags:
        - Key: Project
          Value: digest-agent
 
  WeeklySynthesisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-weekly-synthesis-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: week_id
          AttributeType: S
      KeySchema:
        - AttributeName: week_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl              # 90-day TTL written by Trend node
        Enabled: true
      Tags:
        - Key: Project
          Value: digest-agent
 
  TrendsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-trends-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD               # queried on every run — standard is faster
      AttributeDefinitions:
        - AttributeName: trend_id
          AttributeType: S
      KeySchema:
        - AttributeName: trend_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: digest-agent
 
  SourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "digest-sources-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD               # read on every run for reputation map
      AttributeDefinitions:
        - AttributeName: domain
          AttributeType: S
      KeySchema:
        - AttributeName: domain
          KeyType: HASH
      Tags:
        - Key: Project
          Value: digest-agent
 
 
  # ---------------------------------------------------------------------------
  # IAM Role
  # Least-privilege: only the specific actions this Lambda actually needs.
  # ---------------------------------------------------------------------------
 
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "digest-agent-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic Lambda execution — allows CloudWatch Logs writes only
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DigestAgentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
 
              # DynamoDB — all four tables, only the operations we actually use
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RunRecordsTable.Arn
                  - !GetAtt WeeklySynthesisTable.Arn
                  - !GetAtt TrendsTable.Arn
                  - !GetAtt SourcesTable.Arn
 
              # Bedrock — all models used in the pipeline
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  # Haiku 4.5 — topic, scoring, synthesis support, trend weekly synthesis
                  # Wildcard region required — the us.* cross-region inference profile routes
                  # across us-east-1, us-east-2, and us-west-2 at runtime.
                  - "arn:aws:bedrock:*::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0"
                  # Sonnet 4.6 — kept for potential fallback; writer now uses Gemini
                  # Amazon Nova Lite v2 — fetch article enrichment
                  - "arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.amazon.nova-2-lite-v1:0"
                  # Amazon Nova Pro — input supervisor
                  - "arn:aws:bedrock:*::foundation-model/amazon.nova-pro-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.amazon.nova-pro-v1:0"
                  # Meta Llama 4 Scout — trend signal clustering
                  - "arn:aws:bedrock:*::foundation-model/meta.llama4-scout-17b-instruct-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.meta.llama4-scout-17b-instruct-v1:0"
                  # Meta Llama 4 Maverick — output supervisor
                  - "arn:aws:bedrock:*::foundation-model/meta.llama4-maverick-17b-instruct-v1:0"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.meta.llama4-maverick-17b-instruct-v1:0"

              # S3 — personal site article uploads and sitemap
              - Sid: PersonalSiteArticleUpload
                Effect: Allow
                Action: s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${PersonalSiteBucketName}/articles/*"
                  - !Sub "arn:aws:s3:::${PersonalSiteBucketName}/sitemap.xml"

              # S3 — read articles/manifest.json (written daily, so never subject
              # to the 90-day lifecycle expiration on the articles/ prefix)
              - Sid: PersonalSiteReadManifest
                Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${PersonalSiteBucketName}/articles/manifest.json"

              # S3 — list articles prefix to detect existing content
              - Sid: PersonalSiteListArticles
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${PersonalSiteBucketName}"
                Condition:
                  StringLike:
                    s3:prefix: "articles/*"

              # CloudFront — invalidate cache after content updates
              - Sid: PersonalSiteCFInvalidate
                Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PersonalSiteDistributionId}"
 
 
  # ---------------------------------------------------------------------------
  # Lambda Function
  # ---------------------------------------------------------------------------
 
  DigestAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "digest-agent-${Environment}"
      Description: "AI Agent Morning Digest — hub-and-spoke CrewAI pipeline"
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          # DynamoDB table names — match what CFT creates above
          DYNAMODB_RUNS_TABLE: !Ref RunRecordsTable
          DYNAMODB_WEEKLY_TABLE: !Ref WeeklySynthesisTable
          DYNAMODB_TRENDS_TABLE: !Ref TrendsTable
          DYNAMODB_SOURCES_TABLE: !Ref SourcesTable
          # Gmail SMTP
          SMTP_SENDER_EMAIL: !Ref SmtpSenderEmail
          SMTP_RECIPIENT_EMAIL: !Ref SmtpRecipientEmail
          SMTP_APP_TOKEN: !Ref SmtpPassword
          # Gemini — digest writer (near-zero cost; replaces Bedrock Sonnet for synthesis)
          GEMINI_API_KEY: !Ref GeminiApiKey
          GEMINI_MODEL_SYNTHESIS: "gemini/gemini-3.5-flash"
          # Bedrock model IDs — must match model IDs in AWS Bedrock console
          BEDROCK_MODEL_SYNTHESIS_SUPPORT: "bedrock/us.meta.llama4-maverick-17b-instruct-v1:0"
          BEDROCK_MODEL_TOPIC: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
          BEDROCK_MODEL_FETCH: "bedrock/us.amazon.nova-2-lite-v1:0"
          BEDROCK_MODEL_SCORING: "bedrock/us.meta.llama4-maverick-17b-instruct-v1:0"
          BEDROCK_MODEL_TREND: "bedrock/us.meta.llama4-scout-17b-instruct-v1:0"
          BEDROCK_MODEL_TREND_WEEKLY: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
          # Supervisor models — intentionally different providers to avoid monoculture
          BEDROCK_MODEL_INPUT_SUPERVISOR: "bedrock/us.amazon.nova-pro-v1:0"
          BEDROCK_MODEL_OUTPUT_SUPERVISOR: "bedrock/us.meta.llama4-maverick-17b-instruct-v1:0"
          # AWS region passed explicitly so boto3 clients don't need to discover it
          AWS_REGION_NAME: !Ref AWS::Region
          # Lambda's filesystem is read-only except /tmp. Setting HOME=/tmp redirects
          # home-directory cache/config writes from crewai, litellm, and other libraries.
          HOME: /tmp
          # Personal site S3 publishing
          PERSONAL_SITE_BUCKET: !Ref PersonalSiteBucketName
          PERSONAL_SITE_CF_DIST_ID: !Ref PersonalSiteDistributionId
          PERSONAL_SITE_DOMAIN: !Ref PersonalSiteDomain
          PERSONAL_SITE_AUTHOR_NAME: !Ref PersonalSiteAuthorName
      Tags:
        - Key: Project
          Value: digest-agent
 
 
  # ---------------------------------------------------------------------------
  # EventBridge Scheduled Rule
  # ---------------------------------------------------------------------------
 
  DigestScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "digest-agent-daily-${Environment}"
      Description: "Triggers the digest agent Lambda every morning"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: DigestAgentTarget
          Arn: !GetAtt DigestAgentFunction.Arn
          RetryPolicy:
            MaximumRetryAttempts: 0   # disable EventBridge retries — idempotency handled in handler
 
  # Permission for EventBridge to invoke the Lambda
  DigestSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DigestAgentFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DigestScheduleRule.Arn
 
 
# =============================================================================
# Outputs
# Values printed after deploy — useful for debugging and future stack references
# =============================================================================
Outputs:
 
  LambdaFunctionName:
    Description: "Lambda function name"
    Value: !Ref DigestAgentFunction
 
  LambdaFunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt DigestAgentFunction.Arn
 
  RunRecordsTableName:
    Description: "DynamoDB run records table name"
    Value: !Ref RunRecordsTable
 
  TrendsTableName:
    Description: "DynamoDB trends table name"
    Value: !Ref TrendsTable
 
  SourcesTableName:
    Description: "DynamoDB sources table name"
    Value: !Ref SourcesTable
 
  LambdaRoleArn:
    Description: "IAM role ARN — useful for verifying permissions"
    Value: !GetAtt LambdaExecutionRole.Arn